<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f1f5f9;min-height:100vh;font-size:15px}
  button{cursor:pointer;font-family:inherit}
  input,select,textarea{font-family:inherit;font-size:15px}

  /* Header */
  #header{background:#0f766e;color:white;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:50;gap:10}
  #header h1{font-size:17px;font-weight:700}
  #header p{font-size:11px;opacity:0.75;margin-top:1px}
  .tab-row{display:flex;gap:6px;flex-wrap:wrap}
  .tab{padding:6px 13px;border-radius:16px;border:none;font-size:13px;font-weight:600;cursor:pointer}
  .tab.on{background:white;color:#0f766e}
  .tab.off{background:rgba(255,255,255,0.18);color:white}
  .export-btn{padding:6px 13px;border-radius:8px;border:1px solid rgba(255,255,255,0.5);background:transparent;color:white;font-size:13px;font-weight:600}

  /* Content */
  #content{max-width:680px;margin:0 auto;padding:14px 14px 80px}

  /* Date nav */
  .date-nav{display:flex;align-items:center;gap:10;margin-bottom:12px}
  .arrow{width:40px;height:40px;border-radius:50%;border:1px solid #cbd5e1;background:white;font-size:22px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:opacity .2s}
  .arrow:disabled{opacity:0.25;cursor:default}
  .date-center{flex:1;text-align:center}
  .date-main{font-size:16px;font-weight:700;color:#0f766e}
  .date-sub{font-size:12px;color:#94a3b8;margin-top:2px}

  /* Totals banner */
  .banner{background:linear-gradient(135deg,#0f766e,#0d9488);border-radius:12px;padding:13px 16px;margin-bottom:10px;color:white}
  .banner-label{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;opacity:0.75;margin-bottom:8px}
  .banner-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:0}
  .banner-col{display:flex;flex-direction:column;align-items:center;border-left:1px solid rgba(255,255,255,0.2);padding:0 4px}
  .banner-col:first-child{border-left:none;padding-left:0}
  .banner-val{font-size:14px;font-weight:700;min-height:20px;text-align:center}
  .banner-lbl{font-size:10px;opacity:0.7;margin-bottom:5px;text-align:center}
  .banner-input{width:100%;background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);border-radius:5px;padding:3px 4px;color:white;font-size:11px;text-align:center;outline:none}
  .banner-input::placeholder{color:rgba(255,255,255,0.5)}

  /* Day meta fields */
  .meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
  .meta-grid.full{grid-template-columns:1fr}
  .meta-field label{display:block;font-size:10px;color:#94a3b8;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:3px}
  .meta-field input{width:100%;padding:9px 10px;border:1px solid #e2e8f0;border-radius:8px;font-size:14px;outline:none;background:white}

  /* Meal groups */
  .meal-group{border-radius:10px;overflow:hidden;border:1px solid #e2e8f0;background:white;margin-bottom:10px}
  .meal-header{display:flex;align-items:center;gap:8px;padding:8px 14px;border-left:4px solid}
  .meal-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
  .meal-title{font-size:11px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;color:#475569}
  .entry-row{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;border-top:1px solid #f1f5f9}
  .entry-time{font-size:12px;color:#94a3b8;min-width:38px;padding-top:2px;flex-shrink:0}
  .entry-body{flex:1;min-width:0}
  .entry-desc{font-size:14px;color:#1e293b;margin-bottom:4px;word-break:break-word}
  .entry-macros{display:flex;flex-wrap:wrap;gap:5px}
  .macro-pill{font-size:11px;background:#f1f5f9;color:#64748b;padding:2px 7px;border-radius:5px}
  .entry-actions{display:flex;gap:4px;flex-shrink:0}
  .icon-btn{background:none;border:none;font-size:16px;opacity:0.5;padding:4px;min-width:32px;min-height:32px;display:flex;align-items:center;justify-content:center}

  /* Add button */
  .add-btn{display:block;width:100%;padding:13px;background:#0f766e;color:white;border:none;border-radius:10px;font-size:16px;font-weight:600;margin-top:14px}

  /* Form */
  .form-card{margin-top:14px;background:white;border:1px solid #e2e8f0;border-radius:12px;padding:16px}
  .form-title{font-size:15px;font-weight:700;color:#0f766e;margin-bottom:14px}
  .form-grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
  .form-grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
  .form-field label{display:block;font-size:10px;color:#94a3b8;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:3px}
  .form-field input,.form-field select{width:100%;padding:9px 10px;border:1px solid #e2e8f0;border-radius:8px;font-size:14px;outline:none;background:#fafafa}
  .desc-row{display:flex;gap:8px;margin-bottom:6px}
  .desc-row input{flex:1;padding:9px 10px;border:1px solid #e2e8f0;border-radius:8px;font-size:14px;outline:none;background:#fafafa}
  .estimate-btn{padding:9px 14px;border:none;border-radius:8px;background:#0d9488;color:white;font-size:13px;font-weight:600;white-space:nowrap;flex-shrink:0}
  .estimate-btn:disabled{background:#94a3b8}
  .desc-hint{font-size:11px;color:#94a3b8;margin-bottom:10px}
  .form-actions{display:flex;gap:8px;justify-content:flex-end}
  .cancel-btn{padding:10px 18px;border:1px solid #cbd5e1;border-radius:8px;background:white;color:#475569;font-size:14px}
  .save-btn{padding:10px 18px;border:none;border-radius:8px;background:#0f766e;color:white;font-size:14px;font-weight:600}

  /* Week view */
  .week-card{background:white;border:1px solid #e2e8f0;border-radius:12px;padding:14px;margin-bottom:10px;cursor:pointer}
  .week-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
  .week-date{font-size:14px;font-weight:700;color:#0f766e}
  .steps-badge{font-size:11px;background:#f1f5f9;color:#475569;padding:2px 8px;border-radius:10px}
  .week-macros{font-size:12px;color:#0f766e;font-weight:600;margin-bottom:5px;display:flex;flex-wrap:wrap;gap:6px}
  .week-exercise{font-size:12px;color:#0369a1;margin-bottom:2px}
  .week-symptoms{font-size:12px;color:#b45309;font-style:italic;margin-bottom:2px}
  .week-meds{font-size:12px;color:#7c3aed;margin-bottom:6px}
  .meal-chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}
  .meal-chip{font-size:11px;border:1px solid;border-radius:7px;padding:2px 7px}
  .more-badge{font-size:11px;background:#f1f5f9;color:#64748b;padding:2px 7px;border-radius:7px}

  /* Empty state */
  .empty{text-align:center;color:#94a3b8;padding:32px 0;font-style:italic}

  /* Modal */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px}
  .modal{background:white;border-radius:12px;padding:24px;width:100%;max-width:320px;text-align:center}
  .modal p{font-weight:600;color:#1e293b;margin-bottom:16px}
  .modal-btns{display:flex;gap:10px;justify-content:center}
  .del-btn{padding:9px 18px;border:none;border-radius:8px;background:#ef4444;color:white;font-weight:600;font-size:14px}

  /* Toast */
  #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1e293b;color:white;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;opacity:0;transition:opacity .3s;z-index:200;pointer-events:none}
  #toast.show{opacity:1}
</style>
</head>

function allDates() { return [...new Set(entries.map(e=>e.date))].sort(); }
function selDate()  { const d = allDates(); return d[dateIdx] || d[0] || "2026-03-03"; }
function getInfo()  { return daily[selDate()] || {steps:"",exercise:"",symptoms:"",meds:"",cal:"",pro:"",carb:"",fat:""}; }

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 1800);
}

// ── Tab ──────────────────────────────────────────────────────────────────────
function setTab(tab) {
  currentTab = tab;
  document.getElementById("tab-log").className  = "tab " + (tab==="log"  ? "on":"off");
  document.getElementById("tab-week").className = "tab " + (tab==="week" ? "on":"off");
  render();
}

// ── Render ───────────────────────────────────────────────────────────────────
function render() {
  const c = document.getElementById("content");
  c.innerHTML = currentTab === "log" ? renderLog() : renderWeek();
  attachEvents();
}

function renderLog() {
  const dates = allDates();
  const date  = selDate();
  const info  = getInfo();
  const dayEntries = entries.filter(e=>e.date===date).sort((a,b)=>a.time.localeCompare(b.time));

  // Group by type
  const groups = TYPES.filter(t => dayEntries.some(e=>e.type===t)).map(type => {
    const m = TYPE_META[type];
    const rows = dayEntries.filter(e=>e.type===type).map(e => {
      const macros = [
        e.calories && e.calories!=="0" ? `<span class="macro-pill">🔥 ${e.calories} kcal</span>` : "",
        e.protein  && e.protein!=="0"  ? `<span class="macro-pill">P ${e.protein}g</span>` : "",
        e.carbs    && e.carbs!=="0"    ? `<span class="macro-pill">C ${e.carbs}g</span>` : "",
        e.fat      && e.fat!=="0"      ? `<span class="macro-pill">F ${e.fat}g</span>` : "",
      ].join("");
      return `<div class="entry-row">
        <div class="entry-time">${e.time||"—"}</div>
        <div class="entry-body">
          <div class="entry-desc">${esc(e.description)}</div>
          <div class="entry-macros">${macros}</div>
        </div>
        <div class="entry-actions">
          <button class="icon-btn" onclick="openEdit('${e.id}')">✏️</button>
          <button class="icon-btn" onclick="confirmDel('${e.id}')">🗑️</button>
        </div>
      </div>`;
    }).join("");
    return `<div class="meal-group">
      <div class="meal-header" style="background:${m.bg};border-left-color:${m.border}">
        <div class="meal-dot" style="background:${m.text}"></div>
        <span class="meal-title">${type}</span>
      </div>${rows}</div>`;
  }).join("");

  const form = formVisible ? renderForm() : "";

  return `
    <!-- Date nav -->
    <div class="date-nav">
      <button class="arrow" onclick="prevDay()" ${dateIdx===0?"disabled":""}>‹</button>
      <div class="date-center">
        <div class="date-main">${fmtDate(date)}</div>
        <div class="date-sub">Day ${dateIdx+1} of ${dates.length}</div>
      </div>
      <button class="arrow" onclick="nextDay()" ${dateIdx>=dates.length-1?"disabled":""}>›</button>
    </div>

    <!-- Totals banner -->
    <div class="banner">
      <div class="banner-label">Daily Totals</div>
      <div class="banner-grid">
        ${[{k:"cal",l:"Calories"},{k:"pro",l:"Protein g"},{k:"carb",l:"Carbs g"},{k:"fat",l:"Fat g"}].map(({k,l})=>`
        <div class="banner-col">
          <div class="banner-val">${info[k]||"—"}</div>
          <div class="banner-lbl">${l}</div>
          <input class="banner-input" value="${esc(info[k]||"")}" placeholder="add" data-field="${k}" onchange="updateInfo('${k}',this.value)"/>
        </div>`).join("")}
      </div>
    </div>

    <!-- Steps + Exercise -->
    <div class="meta-grid">
      <div class="meta-field">
        <label>👟 Steps</label>
        <input value="${esc(info.steps||"")}" placeholder="e.g. 8500" onchange="updateInfo('steps',this.value)"/>
      </div>
      <div class="meta-field">
        <label>🏃 Exercise</label>
        <input value="${esc(info.exercise||"")}" placeholder="e.g. 5km run" onchange="updateInfo('exercise',this.value)"/>
      </div>
    </div>

    <!-- Symptoms + Meds -->
    <div class="meta-grid" style="margin-bottom:14px">
      <div class="meta-field">
        <label>🩺 Symptoms</label>
        <input value="${esc(info.symptoms||"")}" placeholder="e.g. headache, fatigue" onchange="updateInfo('symptoms',this.value)"/>
      </div>
      <div class="meta-field">
        <label>💊 Medication</label>
        <input value="${esc(info.meds||"")}" placeholder="e.g. Panado 19:30" onchange="updateInfo('meds',this.value)"/>
      </div>
    </div>

    <!-- Entries -->
    ${dayEntries.length===0 ? '<div class="empty">No entries for this day yet.</div>' : groups}

    <button class="add-btn" onclick="openAdd()">+ Add Entry</button>
    ${form}

    <!-- Delete modal -->
    ${delId ? `<div class="modal-overlay">
      <div class="modal">
        <p>Delete this entry?</p>
        <div class="modal-btns">
          <button class="cancel-btn" onclick="cancelDel()">Cancel</button>
          <button class="del-btn" onclick="doDelete()">Delete</button>
        </div>
      </div>
    </div>` : ""}
  `;
}

function renderForm() {
  const editing = editId !== null;
  const entry = editing ? entries.find(e=>e.id===editId) : {time:"",type:"Breakfast",description:"",calories:"",protein:"",carbs:"",fat:""};
  return `
    <div class="form-card" id="entry-form">
      <div class="form-title">${editing ? "Edit Entry" : "New Entry"}</div>
      <div class="form-grid2">
        <div class="form-field">
          <label>Time</label>
          <input type="time" id="f-time" value="${entry.time||""}"/>
        </div>
        <div class="form-field">
          <label>Type</label>
          <select id="f-type">
            ${TYPES.map(t=>`<option ${entry.type===t?"selected":""}>${t}</option>`).join("")}
          </select>
        </div>
      </div>
      <div class="form-field" style="margin-bottom:4px">
        <label>Description *</label>
        <div class="desc-row">
          <input id="f-desc" value="${esc(entry.description||"")}" placeholder="What did you eat or drink?"/>
          <button class="estimate-btn" id="est-btn" onclick="doEstimate()" ${estimating?"disabled":""}>
            ${estimating ? "⏳…" : "✨ Estimate"}
          </button>
        </div>
        <div class="desc-hint">Type description then tap Estimate to auto-fill macros</div>
      </div>
      <div class="form-grid4">
        ${["calories","protein","carbs","fat"].map(k=>`
        <div class="form-field">
          <label>${k}</label>
          <input id="f-${k}" value="${esc(entry[k]||"")}" placeholder="~"/>
        </div>`).join("")}
      </div>
      <div class="form-actions">
        <button class="cancel-btn" onclick="closeForm()">Cancel</button>
        <button class="save-btn" onclick="saveEntry()">${editing?"Update":"Save"}</button>
      </div>
    </div>`;
}

function renderWeek() {
  const dates = allDates();
  if (!dates.length) return '<div class="empty">No data yet.</div>';
  return `<div style="font-size:17px;font-weight:700;color:#1e293b;margin-bottom:14px">Week at a Glance</div>` +
  dates.map((d,i) => {
    const di = daily[d] || {};
    const meals = entries.filter(e=>e.date===d && e.type!=="Drink");
    const chips = meals.slice(0,4).map(e=>{
      const m = TYPE_META[e.type]||TYPE_META.Snack;
      return `<span class="meal-chip" style="border-color:${m.border};color:${m.text}">${esc(e.description.length>38?e.description.slice(0,38)+"…":e.description)}</span>`;
    }).join("") + (meals.length>4 ? `<span class="more-badge">+${meals.length-4} more</span>` : "");
    return `<div class="week-card" onclick="goToDay(${i})">
      <div class="week-top">
        <span class="week-date">${fmtDateShort(d)}</span>
        ${di.steps ? `<span class="steps-badge">👟 ${Number(di.steps).toLocaleString()}</span>` : ""}
      </div>
      ${di.cal ? `<div class="week-macros"><span>🔥 ${di.cal} kcal</span>${di.pro?`<span>· P ${di.pro}g</span>`:""}${di.carb?`<span>· C ${di.carb}g</span>`:""}${di.fat?`<span>· F ${di.fat}g</span>`:""}</div>` : ""}
      ${di.exercise ? `<div class="week-exercise">🏃 ${esc(di.exercise)}</div>` : ""}
      ${di.symptoms ? `<div class="week-symptoms">🩺 ${esc(di.symptoms)}</div>` : ""}
      ${di.meds     ? `<div class="week-meds">💊 ${esc(di.meds)}</div>` : ""}
      <div class="meal-chips">${chips}</div>
    </div>`;
  }).join("");
}

// ── Actions ──────────────────────────────────────────────────────────────────
function prevDay() { if(dateIdx>0){ dateIdx--; formVisible=false; editId=null; render(); } }
function nextDay() { const d=allDates(); if(dateIdx<d.length-1){ dateIdx++; formVisible=false; editId=null; render(); } }
function goToDay(i) { dateIdx=i; setTab("log"); }

function updateInfo(field, val) {
  const d = selDate();
  if (!daily[d]) daily[d] = {steps:"",exercise:"",symptoms:"",meds:"",cal:"",pro:"",carb:"",fat:""};
  daily[d][field] = val;
  save();
}

function openAdd()  { editId=null; formVisible=true; render(); setTimeout(()=>{ document.getElementById("entry-form")?.scrollIntoView({behavior:"smooth"}); },60); }
function openEdit(id) { editId=id; formVisible=true; render(); setTimeout(()=>{ document.getElementById("entry-form")?.scrollIntoView({behavior:"smooth"}); },60); }
function closeForm()  { editId=null; formVisible=false; render(); }

function saveEntry() {
  const desc = document.getElementById("f-desc")?.value?.trim();
  if (!desc) { showToast("Please add a description"); return; }
  const entry = {
    id:    editId || uid(),
    date:  selDate(),
    time:  document.getElementById("f-time")?.value || "",
    type:  document.getElementById("f-type")?.value || "Snack",
    description: desc,
    calories: document.getElementById("f-calories")?.value || "",
    protein:  document.getElementById("f-protein")?.value  || "",
    carbs:    document.getElementById("f-carbs")?.value    || "",
    fat:      document.getElementById("f-fat")?.value      || "",
  };
  if (editId) {
    entries = entries.map(e => e.id===editId ? entry : e);
  } else {
    entries.push(entry);
    // Ensure date is in allDates
    if (!daily[entry.date]) daily[entry.date] = {steps:"",exercise:"",symptoms:"",meds:"",cal:"",pro:"",carb:"",fat:""};
    // Jump to that date
    const idx = allDates().indexOf(entry.date);
    if (idx>=0) dateIdx = idx;
  }
  formVisible=false; editId=null;
  save(); render();
}

function confirmDel(id) { delId=id; render(); }
function cancelDel()    { delId=null; render(); }
function doDelete()     { entries=entries.filter(e=>e.id!==delId); delId=null; save(); render(); }

async function doEstimate() {
  const desc = document.getElementById("f-desc")?.value?.trim();
  if (!desc) return;
  estimating = true;
  const btn = document.getElementById("est-btn");
  if (btn) { btn.disabled=true; btn.textContent="⏳ Estimating…"; }
  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({
        model:"claude-sonnet-4-20250514",
        max_tokens:200,
        messages:[{role:"user",content:`Estimate calories and macros for: "${desc}". Reply ONLY with JSON, no markdown:\n{"calories":"~XXX","protein":"~XX","carbs":"~XX","fat":"~XX"}\nUse ~ prefix. Use ranges like ~200–250 where appropriate.`}]
      })
    });
    const data = await res.json();
    const text = data.content?.[0]?.text || "";
    const parsed = JSON.parse(text.replace(/```json|```/g,"").trim());
    if (document.getElementById("f-calories")) {
      document.getElementById("f-calories").value = parsed.calories || "";
      document.getElementById("f-protein").value  = parsed.protein  || "";
      document.getElementById("f-carbs").value    = parsed.carbs    || "";
      document.getElementById("f-fat").value      = parsed.fat      || "";
      showToast("Macros estimated ✓");
    }
  } catch(e) {
    showToast("Estimate failed — fill manually");
  }
  estimating = false;
  if (document.getElementById("est-btn")) {
    document.getElementById("est-btn").disabled = false;
    document.getElementById("est-btn").textContent = "✨ Estimate";
  }
}

function exportCSV() {
  const dates = allDates();
  const rows = [["Date","Day","Time","Type","Description","Calories (est.)","Protein (g)","Carbs (g)","Fat (g)","Steps","Exercise","Symptoms","Medication"]];
  dates.forEach(d => {
    const di = daily[d] || {};
    const dt = new Date(d+"T12:00:00");
    const dateStr = dt.toLocaleDateString("en-GB");
    const dayStr  = dt.toLocaleDateString("en-GB",{weekday:"short"});
    entries.filter(e=>e.date===d).sort((a,b)=>a.time.localeCompare(b.time))
      .forEach(e => rows.push([dateStr,dayStr,e.time,e.type,e.description,e.calories,e.protein,e.carbs,e.fat,"","","",""]));
    rows.push([dateStr+" TOTAL","","","","",di.cal||"",di.pro||"",di.carb||"",di.fat||"",di.steps||"",di.exercise||"",di.symptoms||"",di.meds||""]);
    rows.push([]);
  });
  const csv = rows.map(r=>r.map(v=>`"${String(v||"").replace(/"/g,'""')}"`).join(",")).join("\r\n");
  const blob = new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8;"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href=url; a.download="Anna_FoodLog.csv";
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}

function esc(str) {
  return String(str||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function attachEvents() {}

// ── Init ─────────────────────────────────────────────────────────────────────
load();
// Start on most recent date
const d = allDates();
dateIdx = d.length > 0 ? d.length - 1 : 0;
render();
</script>
