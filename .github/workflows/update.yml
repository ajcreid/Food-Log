name: Update Food Log

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch Notion data and rebuild HTML
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: |
          node << 'EOF'
          const https = require('https');
          const fs = require('fs');

          const TOKEN = process.env.NOTION_TOKEN;

          // Standard database page IDs (what the REST API uses)
          const DB_ENTRIES = '12f7117ab09743b7a38ebdec15bd6080';
          const DB_DAILY   = 'd114a85d19e94168911b3da1de68c305';
          const DB_WEEKLY  = '761fdcaefd0b4c05b21a1295719c4195';

          function notionQuery(dbId) {
            return new Promise((resolve) => {
              const body = JSON.stringify({ page_size: 100 });
              const req = https.request({
                hostname: 'api.notion.com',
                path: '/v1/databases/' + dbId + '/query',
                method: 'POST',
                headers: {
                  'Authorization': 'Bearer ' + TOKEN,
                  'Notion-Version': '2022-06-28',
                  'Content-Type': 'application/json',
                  'Content-Length': Buffer.byteLength(body)
                }
              }, res => {
                let data = '';
                res.on('data', chunk => data += chunk);
                res.on('end', () => {
                  try {
                    const parsed = JSON.parse(data);
                    const count = parsed.results ? parsed.results.length : 'ERROR';
                    console.log('DB ' + dbId + ' HTTP ' + res.statusCode + ' rows=' + count);
                    if (!parsed.results) console.log('  Error body:', JSON.stringify(parsed).slice(0,300));
                    resolve(parsed);
                  } catch(e) {
                    console.log('Parse error:', e.message);
                    resolve({ results: [] });
                  }
                });
              });
              req.on('error', err => { console.log('Req error:', err.message); resolve({ results: [] }); });
              req.write(body);
              req.end();
            });
          }

          function prop(page, name) {
            const p = page.properties[name];
            if (!p) return '';
            if (p.type === 'title')     return p.title.map(t => t.plain_text).join('');
            if (p.type === 'rich_text') return p.rich_text.map(t => t.plain_text).join('');
            if (p.type === 'select')    return p.select ? p.select.name : '';
            if (p.type === 'date')      return p.date ? p.date.start : '';
            if (p.type === 'number')    return p.number != null ? String(p.number) : '';
            return '';
          }

          async function main() {
            const [re, rd, rw] = await Promise.all([
              notionQuery(DB_ENTRIES),
              notionQuery(DB_DAILY),
              notionQuery(DB_WEEKLY)
            ]);

            // Food entries — Date is a date type, extract start
            const entries = (re.results || []).map(p => ({
              date: prop(p,'Date'),
              time: prop(p,'Time'),
              type: prop(p,'Type'),
              description: prop(p,'Description'),
              calories: prop(p,'Calories'),
              protein: prop(p,'Protein'),
              carbs: prop(p,'Carbs'),
              fat: prop(p,'Fat'),
            })).filter(e => e.date).sort((a,b) => a.date.localeCompare(b.date)||a.time.localeCompare(b.time));

            // Daily info — Date is the title field
            const daily = {};
            (rd.results || []).forEach(p => {
              const d = prop(p,'Date'); if (!d) return;
              daily[d] = {
                steps:    prop(p,'Steps'),
                exercise: prop(p,'Exercise'),
                symptoms: prop(p,'Symptoms'),
                meds:     prop(p,'Medication'),
                cal:      prop(p,'Total Calories'),
                pro:      prop(p,'Total Protein'),
                carb:     prop(p,'Total Carbs'),
                fat:      prop(p,'Total Fat'),
              };
            });

            // Weekly summary
            const weekly = {};
            (rw.results || []).forEach(p => {
              const w = prop(p,'Week'); if (!w) return;
              weekly[w] = {
                weight:   parseFloat((prop(p,'Weight (kg)')||'').replace(/[^0-9.]/g,'')) || null,
                avgCal:   parseFloat((prop(p,'Avg Calories')||'').replace(/[^0-9.]/g,'')) || null,
                avgSteps: parseFloat((prop(p,'Avg Steps')||'').replace(/[^0-9.]/g,'')) || null,
                avgPro:   parseFloat((prop(p,'Avg Protein')||'').replace(/[^0-9.]/g,'')) || null,
                avgCarb:  parseFloat((prop(p,'Avg Carbs')||'').replace(/[^0-9.]/g,'')) || null,
                avgFat:   parseFloat((prop(p,'Avg Fat')||'').replace(/[^0-9.]/g,'')) || null,
                exerciseDays: prop(p,'Exercise Days') || null,
              };
            });

            console.log('Result: entries=' + entries.length + ' daily=' + Object.keys(daily).length + ' weekly=' + Object.keys(weekly).length);

            let html = fs.readFileSync('template.html', 'utf8');
            html = html.replace('__NOTION_DATA__', JSON.stringify({ entries, daily, weekly }));
            html = html.replace('__BUILD_TIME__', new Date().toISOString());
            fs.writeFileSync('index.html', html);
            console.log('Done.');
          }

          main().catch(e => { console.error('Fatal:', e); process.exit(1); });
          EOF

      - name: Commit and push
        run: |
          git config user.name "Food Log Bot"
          git config user.email "bot@foodlog.com"
          git add index.html
          git diff --staged --quiet || git commit -m "Auto-update food log data"
          git push
